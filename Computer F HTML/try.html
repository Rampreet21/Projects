<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPUTERS</title>
    <link rel="website icon" href="/img/weblogo.png" type="png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: black;
            color: white;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: transparent;
        }

        .logo {
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-size: 1.5em;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
        }

        .logo img {
            width: 25px;
            height: 25px;
            margin-right: 5px;
            border-radius: 50%;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 15px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 0.9em;
        }

        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .hero-content {
            padding: 20px;
            max-width: 90%;
        }

        .hero-content .con1 {
            font-family: "Dancing Script", serif;
            font-size: 2em;
        }

        .hero-content .con2 {
            font-size: 1em;
            color: rgba(199, 199, 199, 0.792);
        }

        .button {
            background: linear-gradient(90deg, rgb(62, 197, 255) 0%, rgb(17, 69, 240) 100%);
            color: black;
            border: none;
            padding: 10px 15px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .button:active {
            transform: scale(0.98);
        }

        @media (max-width: 1000px) {
            header {
                flex-direction: column;
                text-align: center;
            }
            
            .nav-links {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <section class="hero" id="home">
        <video autoplay muted loop class="bg-video">
            <source src="/img/vidm1.mp4" type="video/mp4">
        </video>
        <header>
            <div class="logo"><img src="/img/game-controller.png" alt=""> Computers</div>
            <nav>
                <ul class="nav-links">
                    <li><a href="#home">HOME</a></li>
                    <li><a href="#Products">PRODUCTS</a></li>
                    <li><a href="#About">ABOUT</a></li>
                    <li><a href="/regis.html" class="button">Register</a></li>
                </ul>
            </nav>
        </header>
        <div class="hero-content">
            <h1 class="con1">Designed for Performance</h1>
            <p class="con2">Welcome to the premier gaming conference event, where industry leaders, developers, and enthusiasts converge to share their passions and showcase groundbreaking innovations.</p>
            <button class="button"><a href="/notworking.html" style="text-decoration: none; color: black;">Explore</a></button>
        </div>
    </section>
</body>

</html>
